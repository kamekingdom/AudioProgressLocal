<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Progress Spatial Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <aside id="sidebar" class="sidebar" aria-hidden="true">
      <div class="sidebar-header">
        <h1>Audio Progress Spatial Demo</h1>
        <button id="sidebarClose" class="icon-btn" type="button" aria-label="Close sidebar">×</button>
      </div>

      <label class="audio-select-wrap">
        <span>audio/ の音源</span>
        <select id="audioSelect"></select>
      </label>

      <div class="actions">
        <button id="reloadBtn" type="button">一覧更新</button>
      </div>

      <div class="mode-select" role="radiogroup" aria-label="Playback mode">
        <label><input type="radio" name="mode" value="A" checked /> Mode A</label>
        <label><input type="radio" name="mode" value="B" /> Mode B</label>
        <label><input type="radio" name="mode" value="N" /> No Motion</label>
      </div>

      <div class="actions">
        <button id="startBtn">開始</button>
        <button id="stopBtn" disabled>停止</button>
      </div>

      <div class="actions">
        <button id="pauseBtn" type="button" disabled>一時停止</button>
      </div>

      <div class="actions skip-actions">
        <input id="skipCount" type="number" min="1" max="2" step="1" value="1" />
        <button id="skipBtn" type="button" disabled>スキップ</button>
      </div>
    </aside>

    <div id="sidebarBackdrop" class="sidebar-backdrop hidden"></div>

    <main class="main-area">
      <section id="stage" class="stage phase-setup">
        <div class="stage-header">
          <button
            id="sidebarToggle"
            class="sidebar-toggle"
            type="button"
            aria-label="Open sidebar"
            aria-expanded="false"
            aria-controls="sidebar"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div id="phaseLabel" class="phase-label">待機中</div>
        </div>

        <div id="darkLayer" class="dark-layer"></div>

        <div id="viewsWrap" class="views-wrap hidden" aria-label="Spatial visualization views">
          <div class="view-card">
            <div class="view-title">Side View (y-z)</div>
            <div class="view-body">
              <img id="sideImg" src="/image/side.png" alt="Side view reference" />
              <canvas id="sideCanvas" aria-label="Side visualization"></canvas>
            </div>
          </div>

          <div class="view-card">
            <div class="view-title">Top View (x-z)</div>
            <div class="view-body">
              <img id="topImg" src="/image/top.png" alt="Top view reference" />
              <canvas id="topCanvas" aria-label="Top visualization"></canvas>
            </div>
          </div>
        </div>

        <div id="progressWrap" class="progress-wrap hidden" aria-live="polite">
          <div class="progress-header">
            <span id="modeLabel">Mode A</span>
            <span id="timeText">0.0 / 0.0 sec</span>
          </div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="/eel.js"></script>
    <script src="main.js"></script>
  </body>
</html>
